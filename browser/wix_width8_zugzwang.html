<div id="pawn-bot-app">
  <div id="start-modal" class="modal">
    <div class="card">
      <h1>8 pions</h1>
      <div class="side-row">
        <button class="side-button active" type="button" data-side="w">Blancs</button>
        <button class="side-button" type="button" data-side="b">Noirs</button>
      </div>
      <button id="start-button" type="button">Jouer</button>
    </div>
  </div>

  <main class="shell">
    <div id="status">Choisis ta couleur.</div>
    <div id="board" aria-label="Echiquier"></div>
    <div class="bar">
      <span>Zugzwang</span>
      <span id="last-move">-</span>
    </div>
  </main>
</div>

<style>
  html,
  body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
  }

  #pawn-bot-app {
    --ink: #17201a;
    --muted: #667165;
    --cream: #f7f0df;
    --sage: #9aaa83;
    --moss: #4d6344;
    --gold: #d6a23b;
    --blue: #6a8fbf;
    width: 100%;
    min-height: 100vh;
    box-sizing: border-box;
    padding: clamp(10px, 3vw, 28px);
    display: grid;
    place-items: center;
    font-family: Georgia, "Times New Roman", serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 18% 12%, rgba(214, 162, 59, 0.22), transparent 34%),
      radial-gradient(circle at 80% 90%, rgba(77, 99, 68, 0.22), transparent 34%),
      linear-gradient(145deg, #f5ecd7, #d9e0ca);
    -webkit-tap-highlight-color: transparent;
  }

  .shell {
    width: min(94vw, 620px);
    display: grid;
    gap: 12px;
  }

  #status {
    min-height: 30px;
    text-align: center;
    font-size: clamp(18px, 5vw, 28px);
    font-weight: 700;
    letter-spacing: -0.03em;
  }

  #board {
    width: 100%;
    aspect-ratio: 1 / 1;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    overflow: hidden;
    border-radius: clamp(18px, 4vw, 34px);
    border: 1px solid rgba(23, 32, 26, 0.28);
    box-shadow:
      0 28px 70px rgba(23, 32, 26, 0.22),
      inset 0 0 0 1px rgba(255, 255, 255, 0.3);
    background: #2f3c2b;
    user-select: none;
  }

  .square {
    position: relative;
    display: grid;
    place-items: center;
    cursor: pointer;
  }

  .light {
    background: var(--cream);
  }

  .dark {
    background: var(--sage);
  }

  .selected {
    box-shadow: inset 0 0 0 clamp(3px, 0.8vw, 5px) var(--blue);
  }

  .target::after {
    content: "";
    width: 24%;
    height: 24%;
    border-radius: 999px;
    background: rgba(77, 99, 68, 0.66);
    box-shadow: 0 0 0 7px rgba(77, 99, 68, 0.13);
  }

  .last {
    box-shadow: inset 0 0 0 clamp(3px, 0.8vw, 5px) rgba(214, 162, 59, 0.78);
  }

  .pawn {
    width: 62%;
    height: 62%;
    border-radius: 999px;
    display: grid;
    place-items: center;
    font-size: clamp(22px, 8vw, 48px);
    line-height: 1;
    z-index: 2;
    box-shadow:
      0 12px 22px rgba(23, 32, 26, 0.24),
      inset 0 2px 5px rgba(255, 255, 255, 0.4),
      inset 0 -5px 10px rgba(0, 0, 0, 0.18);
  }

  .white {
    color: #33433a;
    background: radial-gradient(circle at 35% 25%, #fffaf0, #e7dcc2 58%, #cdbb94);
    border: 2px solid rgba(77, 99, 68, 0.22);
  }

  .black {
    color: #f7f0df;
    background: radial-gradient(circle at 35% 25%, #71805f, #2d3a29 54%, #10150f);
    border: 2px solid rgba(255, 255, 255, 0.16);
  }

  .bar {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 999px;
    color: var(--muted);
    background: rgba(255, 255, 255, 0.42);
    border: 1px solid rgba(23, 32, 26, 0.12);
    backdrop-filter: blur(10px);
    font-size: clamp(13px, 3.4vw, 16px);
  }

  .modal {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: grid;
    place-items: center;
    padding: 18px;
    box-sizing: border-box;
    background: rgba(23, 32, 26, 0.46);
    backdrop-filter: blur(8px);
  }

  .card {
    width: min(92vw, 360px);
    padding: 24px;
    border-radius: 28px;
    background: rgba(247, 240, 223, 0.96);
    border: 1px solid rgba(255, 255, 255, 0.55);
    box-shadow: 0 28px 90px rgba(16, 21, 15, 0.34);
  }

  .card h1 {
    margin: 0 0 18px;
    text-align: center;
    font-size: 38px;
    letter-spacing: -0.06em;
  }

  .side-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }

  button {
    font: inherit;
  }

  .side-button,
  #start-button {
    border: 0;
    border-radius: 999px;
    padding: 13px 16px;
    cursor: pointer;
    font-weight: 700;
  }

  .side-button {
    color: var(--moss);
    background: rgba(77, 99, 68, 0.11);
  }

  .side-button.active {
    color: #fffaf0;
    background: var(--moss);
  }

  #start-button {
    width: 100%;
    color: #fffaf0;
    background: linear-gradient(135deg, #17201a, #4d6344);
    box-shadow: 0 14px 28px rgba(23, 32, 26, 0.22);
  }

  @media (max-width: 420px) {
    #pawn-bot-app {
      padding: 8px;
    }

    .shell {
      width: min(97vw, 620px);
    }

    .pawn {
      width: 68%;
      height: 68%;
    }
  }
</style>

<script>
(function () {
  "use strict";

  const WIDTH = 8;
  const WHITE = "w";
  const BLACK = "b";
  const NO_EP = -1;
  const FILES = "abcdefgh";

  const boardDiv = document.getElementById("board");
  const statusDiv = document.getElementById("status");
  const lastMoveDiv = document.getElementById("last-move");
  const modal = document.getElementById("start-modal");
  const startButton = document.getElementById("start-button");
  const sideButtons = Array.from(document.querySelectorAll(".side-button"));

  let state = initialState();
  let humanSide = WHITE;
  let botSide = BLACK;
  let selected = -1;
  let legalForSelected = [];
  let lastMove = null;
  let locked = false;

  function bit(square) {
    return 1n << BigInt(square);
  }

  function fileOf(square) {
    return square & 7;
  }

  function rankOf(square) {
    return square >> 3;
  }

  function algebraic(square) {
    return FILES[fileOf(square)] + String(rankOf(square) + 1);
  }

  function opposite(side) {
    return side === WHITE ? BLACK : WHITE;
  }

  function initialState() {
    let white = 0n;
    let black = 0n;
    for (let file = 0; file < WIDTH; file++) {
      white |= bit(8 + file);
      black |= bit(48 + file);
    }
    return { white: white, black: black, turn: WHITE, epSquare: NO_EP };
  }

  function cloneState(s) {
    return { white: s.white, black: s.black, turn: s.turn, epSquare: s.epSquare };
  }

  function pawns(s, side) {
    return side === WHITE ? s.white : s.black;
  }

  function active(square) {
    return square >= 0 && square < 64 && fileOf(square) < WIDTH;
  }

  function hasPiece(s, square) {
    return Boolean((s.white | s.black) & bit(square));
  }

  function pieceAt(s, square) {
    if (s.white & bit(square)) return "P";
    if (s.black & bit(square)) return "p";
    return null;
  }

  function iterBits(bitboard, callback) {
    let remaining = bitboard;
    while (remaining) {
      const pawn = remaining & -remaining;
      callback(Number(pawn.toString(2).length - 1));
      remaining ^= pawn;
    }
  }

  function goalWinner(s) {
    for (let file = 0; file < WIDTH; file++) {
      if (s.white & bit(56 + file)) return WHITE;
      if (s.black & bit(file)) return BLACK;
    }
    return null;
  }

  function legalMoves(s) {
    if (goalWinner(s)) return [];

    const own = pawns(s, s.turn);
    const enemy = pawns(s, opposite(s.turn));
    const all = own | enemy;
    const direction = s.turn === WHITE ? 8 : -8;
    const startRank = s.turn === WHITE ? 1 : 6;
    const goalRank = s.turn === WHITE ? 7 : 0;
    const moves = [];

    iterBits(own, function (from) {
      const fromRank = rankOf(from);
      const fromFile = fileOf(from);
      const one = from + direction;

      if (active(one) && !(all & bit(one))) {
        moves.push({
          from: from,
          to: one,
          capture: false,
          double: false,
          enPassant: false,
          winning: rankOf(one) === goalRank
        });

        const two = from + 2 * direction;
        if (fromRank === startRank && active(two) && !(all & bit(two))) {
          moves.push({
            from: from,
            to: two,
            capture: false,
            double: true,
            enPassant: false,
            winning: false
          });
        }
      }

      for (const fileDelta of [-1, 1]) {
        const toFile = fromFile + fileDelta;
        if (toFile < 0 || toFile >= WIDTH) continue;
        const to = one + fileDelta;
        if (!active(to)) continue;

        if (enemy & bit(to)) {
          moves.push({
            from: from,
            to: to,
            capture: true,
            double: false,
            enPassant: false,
            winning: rankOf(to) === goalRank
          });
        } else if (to === s.epSquare) {
          const captured = to - direction;
          if (enemy & bit(captured)) {
            moves.push({
              from: from,
              to: to,
              capture: true,
              double: false,
              enPassant: true,
              winning: false
            });
          }
        }
      }
    });

    moves.sort(function (a, b) {
      return a.from - b.from || a.to - b.to || flags(a) - flags(b);
    });
    return moves;
  }

  function flags(move) {
    return (move.capture ? 1 : 0) | (move.double ? 2 : 0) | (move.enPassant ? 4 : 0) | (move.winning ? 8 : 0);
  }

  function makeMove(s, move) {
    const next = cloneState(s);
    const fromBit = bit(move.from);
    const toBit = bit(move.to);

    if (s.turn === WHITE) {
      next.white ^= fromBit;
      if (move.enPassant) {
        next.black ^= bit(move.to - 8);
      } else if (move.capture) {
        next.black ^= toBit;
      }
      next.white |= toBit;
    } else {
      next.black ^= fromBit;
      if (move.enPassant) {
        next.white ^= bit(move.to + 8);
      } else if (move.capture) {
        next.white ^= toBit;
      }
      next.black |= toBit;
    }

    next.epSquare = move.double ? Math.floor((move.from + move.to) / 2) : NO_EP;
    next.turn = opposite(s.turn);
    return next;
  }

  function terminalWinner(s) {
    const winner = goalWinner(s);
    if (winner) return winner;
    if (legalMoves(s).length === 0) return opposite(s.turn);
    return null;
  }

  function countPawns(s, side) {
    let count = 0;
    iterBits(pawns(s, side), function () {
      count++;
    });
    return count;
  }

  function safeMoveCount(s, side) {
    const sideState = {
      white: s.white,
      black: s.black,
      turn: side,
      epSquare: s.turn === side ? s.epSquare : NO_EP
    };
    let count = 0;
    for (const move of legalMoves(sideState)) {
      const child = makeMove(sideState, move);
      if (terminalWinner(child) === opposite(side)) continue;
      if (legalMoves(child).some(function (reply) { return reply.winning; })) continue;
      count++;
    }
    return count;
  }

  function createsPassedPawn(s, side, square) {
    const enemy = pawns(s, opposite(side));
    const file = fileOf(square);
    const rank = rankOf(square);
    const start = side === WHITE ? rank + 1 : rank - 1;
    const end = side === WHITE ? 8 : -1;
    const step = side === WHITE ? 1 : -1;

    for (let aheadRank = start; aheadRank !== end; aheadRank += step) {
      for (const aheadFile of [file - 1, file, file + 1]) {
        if (aheadFile < 0 || aheadFile >= WIDTH) continue;
        if (enemy & bit(aheadRank * 8 + aheadFile)) return false;
      }
    }
    return true;
  }

  function pathClear(s, side, square) {
    const all = s.white | s.black;
    const direction = side === WHITE ? 8 : -8;
    let cursor = square + direction;
    while (cursor >= 0 && cursor < 64) {
      if (all & bit(cursor)) return false;
      cursor += direction;
    }
    return true;
  }

  function advanceDelta(move, side) {
    if (side === WHITE) return rankOf(move.to) - rankOf(move.from);
    return rankOf(move.from) - rankOf(move.to);
  }

  function promotionDistance(move, side) {
    return side === WHITE ? 7 - rankOf(move.to) : rankOf(move.to);
  }

  function doubleIsEnPassantExposed(s, move, side) {
    if (!move.double || s.epSquare === NO_EP) return false;
    const enemy = pawns(s, opposite(side));
    const epFile = fileOf(s.epSquare);
    const enemyRank = rankOf(move.to);
    for (const fileDelta of [-1, 1]) {
      const fromFile = epFile + fileDelta;
      if (fromFile < 0 || fromFile >= WIDTH) continue;
      if (enemy & bit(enemyRank * 8 + fromFile)) return true;
    }
    return false;
  }

  function zugzwangKey(s, move, side) {
    const child = makeMove(s, move);
    const winner = terminalWinner(child);
    if (winner === side) {
      return [5, -promotionDistance(move, side), Number(move.capture), -move.to];
    }
    if (winner === opposite(side)) {
      return [-5, -move.to];
    }

    const opponentReplies = legalMoves(child);
    let allowsImmediateLoss = false;
    const opponentSafeReplies = [];
    let worstOurFollowupSafeCount = 99;

    for (const reply of opponentReplies) {
      const grandchild = makeMove(child, reply);
      if (terminalWinner(grandchild) === opposite(side)) {
        allowsImmediateLoss = true;
        continue;
      }
      if (legalMoves(grandchild).some(function (answer) { return answer.winning; })) continue;
      opponentSafeReplies.push(reply);
      worstOurFollowupSafeCount = Math.min(
        worstOurFollowupSafeCount,
        safeMoveCount(grandchild, side)
      );
    }

    if (worstOurFollowupSafeCount === 99) worstOurFollowupSafeCount = 0;

    const opponentSafeCount = opponentSafeReplies.length;
    const forcingBonus = opponentSafeCount === 0 ? 1 : 0;
    const passerBonus = createsPassedPawn(child, side, move.to) ? 1 : 0;
    const clearPathBonus = pathClear(child, side, move.to) ? 1 : 0;
    const tacticalBonus = 2 * Number(move.capture) + 3 * Number(move.enPassant);
    const doublePenalty = Number(move.double) + 3 * Number(doubleIsEnPassantExposed(child, move, side));

    return [
      2 - Number(allowsImmediateLoss),
      -opponentSafeCount,
      worstOurFollowupSafeCount,
      safeMoveCount(child, side),
      forcingBonus,
      passerBonus,
      clearPathBonus,
      tacticalBonus,
      advanceDelta(move, side),
      -doublePenalty,
      -move.from,
      -move.to
    ];
  }

  function compareKeys(a, b) {
    const length = Math.max(a.length, b.length);
    for (let i = 0; i < length; i++) {
      const av = a[i] || 0;
      const bv = b[i] || 0;
      if (av !== bv) return av - bv;
    }
    return 0;
  }

  function chooseZugzwangMove(s) {
    const moves = legalMoves(s);
    if (!moves.length) return null;
    const side = s.turn;
    let bestMove = moves[0];
    let bestKey = zugzwangKey(s, bestMove, side);
    for (let i = 1; i < moves.length; i++) {
      const key = zugzwangKey(s, moves[i], side);
      if (compareKeys(key, bestKey) > 0) {
        bestMove = moves[i];
        bestKey = key;
      }
    }
    return bestMove;
  }

  function moveText(move) {
    if (!move) return "-";
    return algebraic(move.from) + algebraic(move.to) + (move.enPassant ? " e.p." : "");
  }

  function render() {
    boardDiv.innerHTML = "";
    const targets = new Set(legalForSelected.map(function (move) { return move.to; }));

    for (let rank = 7; rank >= 0; rank--) {
      for (let file = 0; file < WIDTH; file++) {
        const square = rank * 8 + file;
        const cell = document.createElement("div");
        cell.className = "square " + ((rank + file) % 2 === 0 ? "dark" : "light");
        cell.dataset.square = String(square);
        if (square === selected) cell.classList.add("selected");
        if (targets.has(square)) cell.classList.add("target");
        if (lastMove && (lastMove.from === square || lastMove.to === square)) cell.classList.add("last");

        const piece = pieceAt(state, square);
        if (piece) {
          const pawn = document.createElement("div");
          pawn.className = "pawn " + (piece === "P" ? "white" : "black");
          pawn.textContent = piece === "P" ? "♙" : "♟";
          cell.appendChild(pawn);
        }

        boardDiv.appendChild(cell);
      }
    }
  }

  function updateStatus(text) {
    statusDiv.textContent = text;
  }

  function finishIfNeeded() {
    const winner = terminalWinner(state);
    if (!winner) return false;
    locked = true;
    render();
    updateStatus(winner === humanSide ? "Gagne." : "Perdu.");
    return true;
  }

  function selectSquare(square) {
    const piece = pieceAt(state, square);
    if (!piece || (humanSide === WHITE && piece !== "P") || (humanSide === BLACK && piece !== "p")) {
      selected = -1;
      legalForSelected = [];
      render();
      return;
    }
    selected = square;
    legalForSelected = legalMoves(state).filter(function (move) { return move.from === square; });
    render();
  }

  function playMove(move) {
    state = makeMove(state, move);
    lastMove = move;
    lastMoveDiv.textContent = moveText(move);
    selected = -1;
    legalForSelected = [];
    render();
  }

  function botMove() {
    if (locked || state.turn !== botSide) return;
    const move = chooseZugzwangMove(state);
    if (!move) {
      updateStatus("Gagne.");
      locked = true;
      return;
    }
    playMove(move);
    if (!finishIfNeeded()) updateStatus("A toi.");
  }

  function handleSquare(square) {
    if (locked || state.turn !== humanSide) return;
    if (selected !== -1) {
      const move = legalForSelected.find(function (candidate) { return candidate.to === square; });
      if (move) {
        playMove(move);
        if (!finishIfNeeded()) {
          updateStatus("...");
          setTimeout(botMove, 120);
        }
        return;
      }
    }
    selectSquare(square);
  }

  boardDiv.addEventListener("click", function (event) {
    const square = event.target.closest(".square");
    if (!square || !boardDiv.contains(square)) return;
    handleSquare(Number(square.dataset.square));
  });

  sideButtons.forEach(function (button) {
    button.addEventListener("click", function () {
      humanSide = button.dataset.side;
      sideButtons.forEach(function (item) { item.classList.toggle("active", item === button); });
    });
  });

  startButton.addEventListener("click", function () {
    botSide = opposite(humanSide);
    state = initialState();
    selected = -1;
    legalForSelected = [];
    lastMove = null;
    locked = false;
    lastMoveDiv.textContent = "-";
    modal.style.display = "none";
    render();
    if (humanSide === WHITE) {
      updateStatus("A toi.");
    } else {
      updateStatus("...");
      setTimeout(botMove, 160);
    }
  });

  render();
})();
</script>
